<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TaskFlow – My Tasks</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0b0f1a;
      --card: #111827;
      --card2: #0f172a;
      --border: #1e2a3a;
      --accent: #3b82f6;
      --accent2: #06b6d4;
      --text: #f1f5f9;
      --muted: #64748b;
      --success: #10b981;
      --warning: #f59e0b;
      --error: #ef4444;
      --pending: #f59e0b;
      --done: #10b981;
    }

    body {
      font-family: 'Sora', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(59,130,246,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(59,130,246,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    /* ─── HEADER ─── */
    header {
      background: rgba(17,24,39,0.9);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-sm {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      box-shadow: 0 0 20px rgba(59,130,246,0.3);
    }

    header h1 {
      font-size: 18px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .user-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 13px;
      color: var(--muted);
    }

    .user-badge strong { color: var(--text); }

    .btn-logout {
      padding: 7px 16px;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 8px;
      color: #fca5a5;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Sora', sans-serif;
      transition: all 0.2s;
    }

    .btn-logout:hover { background: rgba(239,68,68,0.2); }

    /* ─── MAIN LAYOUT ─── */
    .main {
      max-width: 900px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    /* ─── STATS ─── */
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 28px;
    }

    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
      text-align: center;
      transition: transform 0.2s;
    }

    .stat-card:hover { transform: translateY(-2px); }
    .stat-num { font-size: 32px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
    .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }
    .stat-card.total .stat-num { color: var(--accent); }
    .stat-card.pending .stat-num { color: var(--warning); }
    .stat-card.done .stat-num { color: var(--success); }

    /* ─── ADD FORM ─── */
    .add-section {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 24px;
    }

    .add-section h2 {
      font-size: 14px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 16px;
      font-family: 'JetBrains Mono', monospace;
    }

    .input-row {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: 12px;
      align-items: end;
    }

    .form-group label {
      display: block;
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 6px;
      font-family: 'JetBrains Mono', monospace;
    }

    input[type="text"] {
      width: 100%;
      padding: 11px 14px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 14px;
      font-family: 'Sora', sans-serif;
      outline: none;
      transition: all 0.2s;
    }

    input[type="text"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.12);
    }

    input::placeholder { color: var(--muted); }

    .btn-add {
      padding: 11px 24px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 10px;
      color: white;
      font-weight: 700;
      font-size: 14px;
      font-family: 'Sora', sans-serif;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
    }

    .btn-add:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(59,130,246,0.35); }

    /* ─── FILTER TABS ─── */
    .filter-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    .filter-btn {
      padding: 7px 18px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Sora', sans-serif;
      transition: all 0.2s;
    }

    .filter-btn.active {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-color: transparent;
      color: white;
    }

    /* ─── TODOS LIST ─── */
    .todos-list { display: flex; flex-direction: column; gap: 12px; }

    .todo-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px 20px;
      display: flex;
      align-items: flex-start;
      gap: 16px;
      transition: all 0.25s;
      animation: fadeSlide 0.3s ease;
    }

    @keyframes fadeSlide {
      from { opacity: 0; transform: translateX(-10px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .todo-item:hover { border-color: rgba(59,130,246,0.3); transform: translateX(4px); }
    .todo-item.done { opacity: 0.6; }

    .todo-check {
      width: 22px; height: 22px;
      border-radius: 6px;
      border: 2px solid var(--border);
      cursor: pointer;
      flex-shrink: 0;
      margin-top: 2px;
      transition: all 0.2s;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px;
    }

    .todo-check.checked {
      background: var(--success);
      border-color: var(--success);
      color: white;
    }

    .todo-content { flex: 1; min-width: 0; }

    .todo-title {
      font-weight: 600;
      font-size: 15px;
      margin-bottom: 4px;
      transition: all 0.2s;
    }

    .todo-item.done .todo-title {
      text-decoration: line-through;
      color: var(--muted);
    }

    .todo-desc { font-size: 13px; color: var(--muted); line-height: 1.5; }

    .todo-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 8px;
    }

    .status-badge {
      padding: 3px 10px;
      border-radius: 10px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      font-family: 'JetBrains Mono', monospace;
    }

    .status-badge.pending { background: rgba(245,158,11,0.15); color: var(--warning); border: 1px solid rgba(245,158,11,0.3); }
    .status-badge.completed { background: rgba(16,185,129,0.15); color: var(--success); border: 1px solid rgba(16,185,129,0.3); }

    .todo-date { font-size: 11px; color: var(--muted); font-family: 'JetBrains Mono', monospace; }

    .todo-actions {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    .btn-icon {
      width: 34px; height: 34px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--muted);
      font-size: 15px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex; align-items: center; justify-content: center;
    }

    .btn-icon:hover { border-color: var(--accent); color: var(--accent); }
    .btn-icon.del:hover { border-color: var(--error); color: var(--error); background: rgba(239,68,68,0.08); }

    /* ─── EMPTY STATE ─── */
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }

    .empty .icon { font-size: 48px; margin-bottom: 16px; }
    .empty h3 { font-size: 18px; font-weight: 600; margin-bottom: 8px; color: var(--text); }
    .empty p { font-size: 14px; }

    /* ─── MODAL ─── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
      z-index: 999;
      display: none;
    }

    .modal-overlay.open { display: flex; animation: fadeIn 0.2s ease; }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .modal {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px;
      width: 100%;
      max-width: 440px;
      margin: 20px;
      animation: scaleIn 0.25s ease;
    }

    @keyframes scaleIn {
      from { transform: scale(0.92); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .modal h3 {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 24px;
      color: var(--text);
    }

    .modal .form-group { margin-bottom: 16px; }

    select {
      width: 100%;
      padding: 11px 14px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 14px;
      font-family: 'Sora', sans-serif;
      outline: none;
    }

    .modal-btns {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }

    .btn-save {
      flex: 1;
      padding: 12px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none; border-radius: 10px;
      color: white; font-weight: 700; font-size: 14px;
      font-family: 'Sora', sans-serif; cursor: pointer;
      transition: all 0.2s;
    }

    .btn-cancel {
      flex: 1;
      padding: 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--muted); font-weight: 600; font-size: 14px;
      font-family: 'Sora', sans-serif; cursor: pointer;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px; right: 24px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 20px;
      font-size: 13px;
      font-weight: 600;
      z-index: 9999;
      display: none;
      animation: slideIn 0.3s ease;
      box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    }

    @keyframes slideIn {
      from { transform: translateX(100px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    .toast.success { border-color: rgba(16,185,129,0.4); color: #6ee7b7; }
    .toast.error { border-color: rgba(239,68,68,0.4); color: #fca5a5; }

    @media (max-width: 600px) {
      .input-row { grid-template-columns: 1fr; }
      .stats { grid-template-columns: repeat(3, 1fr); gap: 10px; }
      .stat-num { font-size: 24px; }
    }
  </style>
</head>
<body>

<!-- Header -->
<header>
  <div class="header-left">
    <div class="logo-sm">✓</div>
    <h1>TaskFlow</h1>
  </div>
  <div class="user-info">
    <div class="user-badge">👤 <strong id="usernameDisplay">User</strong></div>
    <button class="btn-logout" onclick="logout()">Logout</button>
  </div>
</header>

<!-- Main -->
<div class="main">

  <!-- Stats -->
  <div class="stats">
    <div class="stat-card total">
      <div class="stat-num" id="totalCount">0</div>
      <div class="stat-label">Total Tasks</div>
    </div>
    <div class="stat-card pending">
      <div class="stat-num" id="pendingCount">0</div>
      <div class="stat-label">Pending</div>
    </div>
    <div class="stat-card done">
      <div class="stat-num" id="doneCount">0</div>
      <div class="stat-label">Completed</div>
    </div>
  </div>

  <!-- Add Todo -->
  <div class="add-section">
    <h2>+ New Task</h2>
    <div class="input-row">
      <div class="form-group">
        <label>Title *</label>
        <input type="text" id="newTitle" placeholder="Task title..." />
      </div>
      <div class="form-group">
        <label>Description</label>
        <input type="text" id="newDesc" placeholder="Optional description..." />
      </div>
      <button class="btn-add" onclick="createTodo()">Add Task</button>
    </div>
  </div>

  <!-- Filter -->
  <div class="filter-tabs">
    <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
    <button class="filter-btn" onclick="setFilter('pending', this)">Pending</button>
    <button class="filter-btn" onclick="setFilter('completed', this)">Completed</button>
  </div>

  <!-- Todos -->
  <div class="todos-list" id="todosList"></div>

</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <h3>✏️ Edit Task</h3>
    <input type="hidden" id="editId"/>
    <div class="form-group">
      <label>Title *</label>
      <input type="text" id="editTitle" placeholder="Task title..."/>
    </div>
    <div class="form-group">
      <label>Description</label>
      <input type="text" id="editDesc" placeholder="Description..."/>
    </div>
    <div class="form-group">
      <label>Status</label>
      <select id="editStatus">
        <option value="pending">⏳ Pending</option>
        <option value="completed">✅ Completed</option>
      </select>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveEdit()">Save Changes</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  const API = "https://to-do-app-authentication-login-production.up.railway.app/api;
  const userId = localStorage.getItem('user_id');
  const username = localStorage.getItem('username');
  let allTodos = [];
  let currentFilter = 'all';

  // Auth check
  if (!userId) window.location.href = 'login.html';
  document.getElementById('usernameDisplay').textContent = username || 'User';

  // ─── CRUD ───

  async function loadTodos() {
    try {
      const res = await fetch(`${API}/todos?user_id=${userId}`);
      const data = await res.json();
      allTodos = data.todos || [];
      renderTodos();
      updateStats();
    } catch (e) {
      showToast('Cannot connect to server!', 'error');
    }
  }

  async function createTodo() {
    const title = document.getElementById('newTitle').value.trim();
    const description = document.getElementById('newDesc').value.trim();
    if (!title) { showToast('Title is required!', 'error'); return; }

    try {
      const res = await fetch(`${API}/todos`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ user_id: parseInt(userId), title, description })
      });
      const data = await res.json();
      if (data.success) {
        document.getElementById('newTitle').value = '';
        document.getElementById('newDesc').value = '';
        showToast('✓ Task created!', 'success');
        loadTodos();
      }
    } catch (e) {
      showToast('Error creating task', 'error');
    }
  }

  function openEdit(todo) {
    document.getElementById('editId').value = todo.id;
    document.getElementById('editTitle').value = todo.title;
    document.getElementById('editDesc').value = todo.description || '';
    document.getElementById('editStatus').value = todo.status;
    document.getElementById('editModal').classList.add('open');
  }

  function closeModal() {
    document.getElementById('editModal').classList.remove('open');
  }

  async function saveEdit() {
    const id = document.getElementById('editId').value;
    const title = document.getElementById('editTitle').value.trim();
    const description = document.getElementById('editDesc').value.trim();
    const status = document.getElementById('editStatus').value;
    if (!title) { showToast('Title is required!', 'error'); return; }

    try {
      const res = await fetch(`${API}/todos/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, description, status })
      });
      const data = await res.json();
      if (data.success) {
        closeModal();
        showToast('✓ Task updated!', 'success');
        loadTodos();
      }
    } catch (e) {
      showToast('Error updating task', 'error');
    }
  }

  async function deleteTodo(id) {
    if (!confirm('Delete this task?')) return;
    try {
      const res = await fetch(`${API}/todos/${id}`, { method: 'DELETE' });
      const data = await res.json();
      if (data.success) {
        showToast('✓ Task deleted!', 'success');
        loadTodos();
      }
    } catch (e) {
      showToast('Error deleting task', 'error');
    }
  }

  async function toggleStatus(todo) {
    const newStatus = todo.status === 'completed' ? 'pending' : 'completed';
    try {
      await fetch(`${API}/todos/${todo.id}/status`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status: newStatus })
      });
      loadTodos();
    } catch (e) {
      showToast('Error updating status', 'error');
    }
  }

  // ─── RENDER ───

  function setFilter(filter, btn) {
    currentFilter = filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderTodos();
  }

  function renderTodos() {
    const list = document.getElementById('todosList');
    let filtered = allTodos;
    if (currentFilter !== 'all') filtered = allTodos.filter(t => t.status === currentFilter);

    if (filtered.length === 0) {
      list.innerHTML = `
        <div class="empty">
          <div class="icon">${currentFilter === 'completed' ? '🎉' : '📋'}</div>
          <h3>${currentFilter === 'completed' ? 'No completed tasks yet' : 'No tasks found'}</h3>
          <p>${currentFilter === 'all' ? 'Add your first task above!' : 'Tasks will appear here'}</p>
        </div>`;
      return;
    }

    list.innerHTML = filtered.map(todo => `
      <div class="todo-item ${todo.status === 'completed' ? 'done' : ''}">
        <div class="todo-check ${todo.status === 'completed' ? 'checked' : ''}" onclick="toggleStatus(${JSON.stringify(todo).replace(/"/g,'&quot;')})">
          ${todo.status === 'completed' ? '✓' : ''}
        </div>
        <div class="todo-content">
          <div class="todo-title">${escHtml(todo.title)}</div>
          ${todo.description ? `<div class="todo-desc">${escHtml(todo.description)}</div>` : ''}
          <div class="todo-meta">
            <span class="status-badge ${todo.status}">${todo.status}</span>
            <span class="todo-date">${formatDate(todo.created_at)}</span>
          </div>
        </div>
        <div class="todo-actions">
          <button class="btn-icon" onclick='openEdit(${JSON.stringify(todo)})' title="Edit">✏️</button>
          <button class="btn-icon del" onclick="deleteTodo(${todo.id})" title="Delete">🗑</button>
        </div>
      </div>
    `).join('');
  }

  function updateStats() {
    document.getElementById('totalCount').textContent = allTodos.length;
    document.getElementById('pendingCount').textContent = allTodos.filter(t => t.status === 'pending').length;
    document.getElementById('doneCount').textContent = allTodos.filter(t => t.status === 'completed').length;
  }

  // ─── UTILS ───

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function formatDate(dt) {
    if (!dt) return '';
    const d = new Date(dt);
    return d.toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' });
  }

  let toastTimer;
  function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast ${type}`;
    t.style.display = 'block';
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.style.display = 'none', 2500);
  }

  async function logout() {
    await fetch(`${API}/logout`, { method: 'POST', credentials: 'include' }).catch(()=>{});
    localStorage.clear();
    window.location.href = 'login.html';
  }

  // Close modal on outside click
  document.getElementById('editModal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  // Keyboard shortcut: Enter to add todo
  document.getElementById('newDesc').addEventListener('keydown', e => {
    if (e.key === 'Enter') createTodo();
  });

  // Load on start
  loadTodos();
</script>
</body>
</html>
