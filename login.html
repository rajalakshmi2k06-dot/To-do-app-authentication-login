<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login – TaskFlow</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0b0f1a;
      --card: #111827;
      --border: #1e2a3a;
      --accent: #3b82f6;
      --accent2: #06b6d4;
      --text: #f1f5f9;
      --muted: #64748b;
      --success: #10b981;
      --error: #ef4444;
    }

    body {
      font-family: 'Sora', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Animated background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(59,130,246,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(59,130,246,0.05) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridMove 20s linear infinite;
      pointer-events: none;
    }

    @keyframes gridMove {
      0% { transform: translateY(0); }
      100% { transform: translateY(40px); }
    }

    /* Glow blobs */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.15;
      pointer-events: none;
    }
    .blob1 { width: 400px; height: 400px; background: #3b82f6; top: -100px; left: -100px; animation: float 8s ease-in-out infinite; }
    .blob2 { width: 300px; height: 300px; background: #06b6d4; bottom: -50px; right: -50px; animation: float 10s ease-in-out infinite reverse; }

    @keyframes float {
      0%, 100% { transform: translate(0,0); }
      50% { transform: translate(30px, 30px); }
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      padding: 20px;
    }

    .logo {
      text-align: center;
      margin-bottom: 32px;
      animation: slideDown 0.6s ease;
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .logo-icon {
      width: 56px; height: 56px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      margin-bottom: 12px;
      box-shadow: 0 0 30px rgba(59,130,246,0.4);
    }

    .logo h1 {
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .logo p { color: var(--muted); font-size: 13px; margin-top: 4px; }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 36px;
      animation: slideUp 0.6s ease 0.1s both;
      box-shadow: 0 25px 60px rgba(0,0,0,0.4);
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .tabs {
      display: flex;
      background: var(--bg);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 28px;
      border: 1px solid var(--border);
    }

    .tab {
      flex: 1;
      padding: 8px;
      text-align: center;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      border-radius: 8px;
      transition: all 0.2s;
      font-family: 'Sora', sans-serif;
      border: none;
      background: none;
    }

    .tab.active {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
      box-shadow: 0 4px 12px rgba(59,130,246,0.3);
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 8px;
      font-family: 'JetBrains Mono', monospace;
    }

    input {
      width: 100%;
      padding: 12px 16px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 14px;
      font-family: 'Sora', sans-serif;
      transition: all 0.2s;
      outline: none;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
    }

    input::placeholder { color: var(--muted); }

    .btn {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 14px;
      font-weight: 700;
      font-family: 'Sora', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.5px;
      margin-top: 4px;
    }

    .btn:hover { transform: translateY(-1px); box-shadow: 0 8px 25px rgba(59,130,246,0.4); }
    .btn:active { transform: translateY(0); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .alert {
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 13px;
      margin-bottom: 20px;
      display: none;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .alert.error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; }
    .alert.success { background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.3); color: #6ee7b7; }

    .hint {
      text-align: center;
      margin-top: 20px;
      font-size: 12px;
      color: var(--muted);
    }

    .hint span {
      font-family: 'JetBrains Mono', monospace;
      color: var(--accent);
      font-size: 11px;
    }
  </style>
</head>
<body>
  <div class="blob blob1"></div>
  <div class="blob blob2"></div>

  <div class="container">
    <div class="logo">
      <div class="logo-icon">✓</div>
      <h1>TaskFlow</h1>
      <p>Organize your day, your way</p>
    </div>

    <div class="card">
      <div class="tabs">
        <button class="tab active" onclick="switchTab('login')">Login</button>
        <button class="tab" onclick="switchTab('register')">Register</button>
      </div>

      <div id="alertBox" class="alert"></div>

      <!-- Login Form -->
      <div id="loginForm">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="loginUsername" placeholder="Enter your username" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="loginPassword" placeholder="Enter your password" onkeydown="if(event.key==='Enter') doLogin()" />
        </div>
        <button class="btn" id="loginBtn" onclick="doLogin()">Sign In →</button>
        <div class="hint">Default: <span>admin</span> / <span>admin123</span></div>
      </div>

      <!-- Register Form -->
      <div id="registerForm" style="display:none">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="regUsername" placeholder="Choose a username" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="regPassword" placeholder="Min. 4 characters" />
        </div>
        <button class="btn" id="regBtn" onclick="doRegister()">Create Account →</button>
      </div>
    </div>
  </div>

  <script>
   const API = "https://to-do-app-authentication-login-production.up.railway.app/api" ;

    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach((t,i) => {
        t.classList.toggle('active', (i===0 && tab==='login') || (i===1 && tab==='register'));
      });
      document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
      document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
      hideAlert();
    }

    function showAlert(msg, type) {
      const box = document.getElementById('alertBox');
      box.textContent = msg;
      box.className = `alert ${type}`;
      box.style.display = 'block';
    }

    function hideAlert() {
      document.getElementById('alertBox').style.display = 'none';
    }

    async function doLogin() {
      const username = document.getElementById('loginUsername').value.trim();
      const password = document.getElementById('loginPassword').value.trim();
      if (!username || !password) return showAlert('Please fill all fields', 'error');

      const btn = document.getElementById('loginBtn');
      btn.disabled = true; btn.textContent = 'Signing in...';

      try {
        const res = await fetch(`${API}/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (data.success) {
          showAlert('✓ Login successful! Redirecting...', 'success');
          localStorage.setItem('user_id', data.user_id);
          localStorage.setItem('username', data.username);
          setTimeout(() => window.location.href = 'todo.html', 800);
        } else {
          showAlert(data.message, 'error');
        }
      } catch (e) {
        showAlert('Cannot connect to server. Start backend first!', 'error');
      } finally {
        btn.disabled = false; btn.textContent = 'Sign In →';
      }
    }

    async function doRegister() {
      const username = document.getElementById('regUsername').value.trim();
      const password = document.getElementById('regPassword').value.trim();
      if (!username || !password) return showAlert('Please fill all fields', 'error');

      const btn = document.getElementById('regBtn');
      btn.disabled = true; btn.textContent = 'Creating...';

      try {
        const res = await fetch(`${API}/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (data.success) {
          showAlert('✓ Account created! Please login.', 'success');
          setTimeout(() => switchTab('login'), 1200);
        } else {
          showAlert(data.message, 'error');
        }
      } catch (e) {
        showAlert('Cannot connect to server. Start backend first!', 'error');
      } finally {
        btn.disabled = false; btn.textContent = 'Create Account →';
      }
    }

    // If already logged in, redirect
    if (localStorage.getItem('user_id')) window.location.href = 'todo.html';
  </script>
</body>
</html>
